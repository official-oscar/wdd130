<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Blue Ridges Rapids</title>
    <meta name="description"
      content="Get in touch with Blue Ridges Rapids. Book trips, ask questions, or send suggestions. Call or email us today!">
    <meta name="author" content="Osarugue Uwagboe">
    <link rel="stylesheet" href="styles/contact.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Rafting Site Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="hero">
            <section class="company-contact">
                <h1>Blue Ridges Rapids</h1>

                <address>
                    Ekehuan Barracks, along Goshen city street<br>
                    Benin City, Edo State<br>
                    +234 811 525 6806<br>
                    uwagboeosarugue@gmail.com
                </address>
            </section>
        </div>
        <section class="access">
            <div class="location-grid">
                <div class="map">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d79946.50633486206!2d5.531111896985729!3d6.283585236463612!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1040ce6d8d264c4b%3A0x4e5d79842f07ac45!2s7GJP%2BWPG%20Ekehuan%20barracks%2C%20Along%20Goshen%20city%20street%2C%20Benin%20City%20302120%2C%20Edo!5e0!3m2!1sen!2sng!4v1780926617135!5m2!1sen!2sng"
                      width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                <form action="#" method="post" class="info">
                    <div class="form-item column2">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name"
                          required>
                    </div>
                    <div class="form-item column2">
                        <label for="useremail">Email</label>
                        <input type="email" id="useremail" name="useremail"
                          placeholder="Enter a valid email address" required>
                    </div>
                    <div class="form-item column1">
                        <fieldset>
                            <legend>Message Purpose</legend>

                            <div class="radio">
                                <label><input type="radio" name="purpose" value="general" checked>
                                    General Inquiry</label>
                                <label><input type="radio" name="purpose" value="reservation">
                                    Reservation Question</label>
                                <label><input type="radio" name="purpose" value="suggestion">
                                    Website Suggestion</label>
                            </div>

                        </fieldset>
                    </div>
                    <div class="form-item">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="4"
                          placeholder="Type here"></textarea>
                    </div>
                    <div class="form-item">
                        <label> <input type="checkbox" id="newsletter_subscription"
                              name="newsletter_subscription" checked>Please subscribe me to the
                            monthly newsletter</label>
                    </div>
                    <button type="submit">Get in Touch!</button>
                </form>
            </div>

        </section>
        <section class="adventure">
            <h2>We Are Here To Serve You</h2>
            <div class="gallery">
                <figure>
                    <img src="images/adventure1.jpg" alt="Rafting adventures">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/adventure2.jpg" alt="Rafting adventures">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/adventure3.jpg" alt="Rafting adventures">
                    <figcaption>Employee Profile</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>©2026 | Blue Ridge Rapids | Osarugue Uwagboe </p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
